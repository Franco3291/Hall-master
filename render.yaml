services:
  - type: web
    name: smart-campus-matrix
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --workers 4 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: DATABASE_URL
        fromDatabase:
          name: smart-campus-db
          property: connectionString
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_USERNAME
        value: admin

databases:
  - name: smart-campus-db
    region: oregon
    plan: free
    databaseName: smart_campus
    user: smart_campus_user