<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Mode Sign Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --card-dark: #1a1a1a;
            --border-dark: #2a2a2a;
            --text-dark: #ffffff;
            --text-muted: #888;
            --accent: #00ff88;
            --accent-dark: #00cc6a;
            --error: #ff4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated Background */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .animated-bg span {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--accent);
            border-radius: 50%;
            opacity: 0.3;
            animation: float 15s infinite linear;
        }

        @keyframes float {
            from {
                transform: translateY(100vh) scale(0);
            }
            to {
                transform: translateY(-100vh) scale(1);
            }
        }

        .dark-card {
            background: var(--card-dark);
            border-radius: 24px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            border: 1px solid var(--border-dark);
            position: relative;
            z-index: 1;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .dark-card h2 {
            color: var(--text-dark);
            font-size: 28px;
            margin-bottom: 8px;
        }

        .dark-card p {
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 14px;
        }

        .input-field {
            margin-bottom: 20px;
        }

        .input-field label {
            display: block;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
        }

        .input-field input {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-dark);
            border: 1px solid var(--border-dark);
            border-radius: 12px;
            color: var(--text-dark);
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .input-field input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0,255,136,0.1);
        }

        .password-strength {
            margin-top: 8px;
            height: 4px;
            background: var(--border-dark);
            border-radius: 2px;
            overflow: hidden;
        }

        .strength-bar {
            width: 0%;
            height: 100%;
            transition: width 0.3s ease;
        }

        .strength-text {
            font-size: 12px;
            margin-top: 5px;
            color: var(--text-muted);
        }

        .toggle-password {
            position: absolute;
            right: 16px;
            top: 48px;
            cursor: pointer;
            color: var(--text-muted);
            transition: color 0.3s ease;
        }

        .toggle-password:hover {
            color: var(--accent);
        }

        .relative {
            position: relative;
        }

        .btn-dark {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            border: none;
            border-radius: 12px;
            color: var(--bg-dark);
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-dark:hover {
            background: var(--accent-dark);
            transform: translateY(-2px);
        }

        .divider {
            text-align: center;
            margin: 25px 0;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 1px;
            background: var(--border-dark);
        }

        .divider span {
            background: var(--card-dark);
            padding: 0 15px;
            position: relative;
            color: var(--text-muted);
            font-size: 14px;
        }

        .signup-options {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .signup-options button {
            flex: 1;
            padding: 12px;
            background: var(--bg-dark);
            border: 1px solid var(--border-dark);
            border-radius: 12px;
            color: var(--text-dark);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .signup-options button:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .login-footer {
            text-align: center;
            margin-top: 25px;
            color: var(--text-muted);
            font-size: 14px;
        }

        .login-footer a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .error-shake {
            animation: shake 0.3s ease;
        }

        .error-message {
            color: var(--error);
            font-size: 13px;
            margin-top: 5px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="animated-bg" id="particles"></div>

    <div class="dark-card">
        <h2>Create account</h2>
        <p>Start your journey with us today</p>

        <form id="darkForm">
            <div class="input-field">
                <label>Username</label>
                <input type="text" id="darkUsername" placeholder="Choose a username">
                <div class="error-message" id="usernameError"></div>
            </div>

            <div class="input-field">
                <label>Email</label>
                <input type="email" id="darkEmail" placeholder="Enter your email">
                <div class="error-message" id="emailError"></div>
            </div>

            <div class="input-field relative">
                <label>Password</label>
                <input type="password" id="darkPassword" placeholder="Create a password">
                <i class="fas fa-eye toggle-password" id="togglePassword"></i>
                <div class="password-strength">
                    <div class="strength-bar" id="strengthBar"></div>
                </div>
                <div class="strength-text" id="strengthText"></div>
                <div class="error-message" id="passwordError"></div>
            </div>

            <button type="submit" class="btn-dark">Sign Up →</button>
        </form>

        <div class="divider">
            <span>or continue with</span>
        </div>

        <div class="signup-options">
            <button type="button"><i class="fab fa-google"></i> Google</button>
            <button type="button"><i class="fab fa-github"></i> GitHub</button>
        </div>

        <div class="login-footer">
            Already have an account? <a href="#">Log in</a>
        </div>
    </div>

    <script>
        // Particle animation (reduced for better performance)
        const particles = document.getElementById('particles');
        const particleCount = window.innerWidth < 768 ? 30 : 100;
        
        for (let i = 0; i < particleCount; i++) {
            const particle = document.createElement('span');
            const size = Math.random() * 4 + 1;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDuration = Math.random() * 20 + 10 + 's';
            particle.style.animationDelay = Math.random() * 10 + 's'; 
            particles.appendChild(particle);
        }

        // Password strength checker
        const passwordInput = document.getElementById('darkPassword');
        const strengthBar = document.getElementById('strengthBar');
        const strengthText = document.getElementById('strengthText');

        passwordInput.addEventListener('input', function() {
            const password = this.value;
            let strength = 0;
            
            if (password.length >= 6) strength++;
            if (password.match(/[a-z]/)) strength++;
            if (password.match(/[A-Z]/)) strength++;
            if (password.match(/[0-9]/)) strength++;
            if (password.match(/[^a-zA-Z0-9]/)) strength++;
            
            const percentage = (strength / 5) * 100;
            strengthBar.style.width = percentage + '%';
            
            if (percentage <= 20) {
                strengthBar.style.background = '#ff4444';
                strengthText.textContent = 'Weak password';
            } else if (percentage <= 60) {
                strengthBar.style.background = '#ffaa00';
                strengthText.textContent = 'Medium password';
            } else {
                strengthBar.style.background = '#00ff88';
                strengthText.textContent = 'Strong password';
            }
        });

        // Toggle password visibility
        const toggleBtn = document.getElementById('togglePassword');
        let passwordVisible = false;

        toggleBtn.addEventListener('click', function() {
            passwordVisible = !passwordVisible;
            const type = passwordVisible ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });

        // Form validation
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        const usernameRegex = /^[a-zA-Z0-9_-]{3,20}$/;

        function clearErrors() {
            document.getElementById('usernameError').style.display = 'none';
            document.getElementById('emailError').style.display = 'none';
            document.getElementById('passwordError').style.display = 'none';
        }

        function showFieldError(fieldId, message) {
            document.getElementById(fieldId).textContent = message;
            document.getElementById(fieldId).style.display = 'block';
        }

        // Form submission
        const darkForm = document.getElementById('darkForm');
        
        darkForm.addEventListener('submit', function(e) {
            e.preventDefault();
            clearErrors();
            
            const username = document.getElementById('darkUsername').value.trim();
            const email = document.getElementById('darkEmail').value.trim();
            const password = passwordInput.value;
            
            let isValid = true;

            // Username validation
            if (!username) {
                showFieldError('usernameError', 'Username is required');
                isValid = false;
            } else if (!usernameRegex.test(username)) {
                showFieldError('usernameError', 'Username must be 3-20 characters (letters, numbers, _, -)');
                isValid = false;
            }

            // Email validation
            if (!email) {
                showFieldError('emailError', 'Email is required');
                isValid = false;
            } else if (!emailRegex.test(email)) {
                showFieldError('emailError', 'Please enter a valid email address');
                isValid = false;
            }

            // Password validation
            if (!password) {
                showFieldError('passwordError', 'Password is required');
                isValid = false;
            } else if (password.length < 6) {
                showFieldError('passwordError', 'Password must be at least 6 characters');
                isValid = false;
            }

            if (!isValid) {
                const card = document.querySelector('.dark-card');
                card.classList.add('error-shake');
                setTimeout(() => {
                    card.classList.remove('error-shake');
                }, 300);
                return;
            }
            
            // Success
            alert(`✨ Welcome ${username}! Account created successfully!`);
            darkForm.reset();
            strengthBar.style.width = '0%';
            strengthText.textContent = '';
            passwordVisible = false;
            toggleBtn.classList.remove('fa-eye-slash');
            toggleBtn.classList.add('fa-eye');
        });
    </script>
</body>
</html>
